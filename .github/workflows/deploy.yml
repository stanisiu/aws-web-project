name: Deploy to DHTAJO EC2 ASG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: web-dhtajo-ecr
  IMAGE_TAG: ${{ github.sha }}
  ASG_NAME: "dhtajo-web-asg"
  LAUNCH_TEMPLATE_NAME: "web-dhtajo-ec2-lt"   # ← 확인된 이름

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 코드
        uses: actions/checkout@v4

      - name: AWS OIDC Role Assume
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::665557889697:role/GitHubActions-ECS-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 및 Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: ASG Instance Refresh (무중단 배포)
        run: |
          echo "🚀 ASG Instance Refresh 시작 (Image: ${{ env.IMAGE_TAG }})"
          
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ env.ASG_NAME }} \
            --preferences '{
              "MinHealthyPercentage": 70,
              "InstanceWarmup": 180,
              "CheckpointPercentages": [50, 100],
              "CheckpointDelay": 90
            }'
          
          echo "✅ ASG Instance Refresh 명령이 성공적으로 전송되었습니다."
